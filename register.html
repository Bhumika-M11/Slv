<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        SLV PROTECH • Digital Onboarding
    </title>

    <!-- FONT -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="register.css">

</head>

<body>

    <!-- BACKGROUND -->

    <div class="background"></div>

    <div class="background-glow glow-1"></div>

    <div class="background-glow glow-2"></div>

    <!-- REGISTER -->

    <section class="register-wrapper">

        <div class="register-card">

            <!-- TOP -->

            <div class="register-top">

                <span class="register-tag">

                    DIGITAL ONBOARDING

                </span>

                <h1>

                    Let’s Build

                    <span class="flip-wrapper">

                        <span id="flipText">

                            Your Business

                        </span>

                    </span>

                </h1>

                <p>

                    Continue with Google or Email to start your onboarding experience.

                </p>

            </div>

            <!-- GOOGLE LOGIN -->

            <button id="googleLoginBtn" class="google-btn">

                <img
                    src="https://www.svgrepo.com/show/475656/google-color.svg"
                    alt="Google">

                Continue With Google

            </button>

            <!-- EMAIL BUTTON -->

            <button id="emailLoginBtn" class="email-btn">

                Continue With Email

            </button>

            <!-- EMAIL AUTH -->

            <div id="emailAuthBox" class="email-auth">

                <input type="email" id="emailInput" placeholder="Enter your work email">

                <button id="sendLinkBtn" class="send-link-btn">

                    Send Login Link

                </button>

            </div>

            <!-- FORM -->

            <form id="leadForm" class="lead-form">

                <!-- NAME -->

                <div class="input-group">

                    <label>
                        Full Name
                    </label>

                    <input type="text" id="fullName" placeholder="Enter your full name" required>

                </div>

                <!-- PHONE -->

                <div class="input-group">

                    <label>
                        Phone Number
                    </label>

                    <input type="tel" id="phoneNumber" placeholder="+91 9876543210" required>

                </div>

                <!-- BUSINESS -->

                <div class="input-group">

                    <label>
                        Business Type
                    </label>

                    <select id="businessType" required>

                        <option value="">
                            Select Business Type
                        </option>

                        <option>
                            Startup
                        </option>

                        <option>
                            Manufacturing
                        </option>

                        <option>
                            Enterprise
                        </option>

                        <option>
                            Retail
                        </option>

                    </select>

                </div>

                <!-- SERVICES -->

                <div class="input-group">

                    <label>
                        Services Needed
                    </label>

                    <textarea id="services" placeholder="Cloud, Website, SEO, Software..." required></textarea>

                </div>

                <!-- DETAILS -->

                <div class="input-group">

                    <label>
                        Project Details
                    </label>

                    <textarea id="projectDetails" placeholder="Tell us more about your project..." required></textarea>

                </div>

                <!-- SUBMIT -->

                <button type="submit" class="submit-btn">

                    Submit Inquiry

                </button>

            </form>

        </div>

    </section>

    <!-- TOAST -->

    <div id="toast" class="toast">

    </div>

    <!-- JS -->

    <script type="module" src="js/register.js"></script>

</body>

</html>
